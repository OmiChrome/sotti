<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Sotti — Java Assistant</title>

  <!-- PWA & Mobile Web App Meta Tags -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1e1e2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sotti" />

  <!-- Fira Code from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ──────────────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: 'Fira Code', 'Consolas', monospace;
    }

    /* ── Main container — full viewport, 4px vertical padding ──────── */
    #main {
      width: 100vw;
      height: 100vh;
      padding: 100px 18px;
      overflow-y: auto;
      overflow-x: hidden;
      /* Reserve bottom-right for GMeet PIP: ~180x130px on mobile */
      padding-bottom: 10px;
    }

    /* ── PIP guard — invisible block at bottom-right corner ────────── */
    #pip-guard {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 180px;
      height: 130px;
      pointer-events: none;
      z-index: 100;
      /* Debug: uncomment to see the zone */
      /* background: rgba(255,0,0,0.15); */
    }

    /* ── Status bar — thin top strip ───────────────────────────────── */
    #status-bar {
      font-size: 11px;
      color: #6c7086;
      padding: 2px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    #status-bar.connected {
      color: #a6e3a1;
    }

    #status-bar.error {
      color: #f38ba8;
    }

    /* ── Code display ──────────────────────────────────────────────── */
    .code-pre {
      display: block;
      width: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      border: none;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.45;
      color: #cdd6f4;
      tab-size: 4;
    }

    /* ── Java syntax colours (Catppuccin Mocha inspired) ───────────── */
    .k {
      color: #cba6f7;
      font-weight: bold;
    }

    /* keyword — mauve     */
    .s {
      color: #a6e3a1;
    }

    /* string  — green     */
    .t {
      color: #f9e2af;
      font-weight: bold;
    }

    /* type    — yellow    */
    .c {
      color: #6c7086;
      font-style: italic;
    }

    /* comment — overlay0  */
    .n {
      color: #fab387;
    }

    /* number  — peach     */
    .a {
      color: #89b4fa;
    }

    /* annotation — blue   */

    /* ── Warn line ─────────────────────────────────────────────────── */
    #warn-line {
      display: none;
      color: #f38ba8;
      font-weight: bold;
      font-family: inherit;
      font-size: 12px;
      white-space: pre-wrap;
      margin-bottom: 2px;
    }

    #warn-line.visible {
      display: block;
    }

    #warn-line.info {
      color: #89b4fa;
    }

    /* ── Idle cursor ───────────────────────────────────────────────── */
    #main.idle .code-pre::after {
      content: '▍';
      animation: blink 1s step-end infinite;
      color: #cba6f7;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    /* ── Question title separator ──────────────────────────────────── */
    .q-title {
      color: #89b4fa;
      font-weight: bold;
      font-size: 12px;
      padding: 6px 0 2px 0;
      border-top: 1px solid #313244;
      margin-top: 8px;
    }

    .q-title:first-child {
      margin-top: 0;
      border-top: none;
    }
  </style>
</head>

<body>

  <!-- PIP guard zone for GMeet picture-in-picture -->
  <div id="pip-guard"></div>

  <div id="main" class="idle">
    <div id="status-bar">Connecting…</div>
    <div id="warn-line" role="alert"></div>
    <pre id="code-display" class="code-pre">Waiting for Sotti…</pre>
  </div>

  <script>
    // ── DOM refs ─────────────────────────────────────────────────────
    const mainEl = document.getElementById('main');
    const statusBar = document.getElementById('status-bar');
    const warnLine = document.getElementById('warn-line');
    const codeDisplay = document.getElementById('code-display');

    let currentRawCode = '';

    // ── Java tokeniser ──────────────────────────────────────────────
    const JAVA_KEYWORDS = new Set([
      'abstract', 'assert', 'boolean', 'break', 'byte', 'case', 'catch', 'char', 'class',
      'const', 'continue', 'default', 'do', 'double', 'else', 'enum', 'extends', 'final',
      'finally', 'float', 'for', 'goto', 'if', 'implements', 'import', 'instanceof', 'int',
      'interface', 'long', 'native', 'new', 'package', 'private', 'protected', 'public',
      'return', 'short', 'static', 'strictfp', 'super', 'switch', 'synchronized', 'this',
      'throw', 'throws', 'transient', 'try', 'var', 'void', 'volatile', 'while', 'record',
      'sealed', 'permits', 'yield', 'null', 'true', 'false'
    ]);

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function tokeniseJava(code) {
      let out = '', i = 0;
      const len = code.length;
      while (i < len) {
        // Single-line comment
        if (code[i] === '/' && code[i + 1] === '/') {
          const end = code.indexOf('\n', i);
          const sl = end === -1 ? code.slice(i) : code.slice(i, end);
          out += `<span class="c">${escHtml(sl)}</span>`; i += sl.length; continue;
        }
        // Block comment
        if (code[i] === '/' && code[i + 1] === '*') {
          const end = code.indexOf('*/', i + 2);
          const sl = end === -1 ? code.slice(i) : code.slice(i, end + 2);
          out += `<span class="c">${escHtml(sl)}</span>`; i += sl.length; continue;
        }
        // String literal
        if (code[i] === '"') {
          let j = i + 1;
          while (j < len) { if (code[j] === '\\') { j += 2; continue; } if (code[j] === '"') { j++; break; } j++; }
          out += `<span class="s">${escHtml(code.slice(i, j))}</span>`; i = j; continue;
        }
        // Char literal
        if (code[i] === "'") {
          let j = i + 1;
          while (j < len) { if (code[j] === '\\') { j += 2; continue; } if (code[j] === "'") { j++; break; } j++; }
          out += `<span class="s">${escHtml(code.slice(i, j))}</span>`; i = j; continue;
        }
        // Annotation
        if (code[i] === '@') {
          let j = i + 1; while (j < len && /\w/.test(code[j])) j++;
          out += `<span class="a">${escHtml(code.slice(i, j))}</span>`; i = j; continue;
        }
        // Number literal
        if (/[0-9]/.test(code[i]) && (i === 0 || /\W/.test(code[i - 1]))) {
          let j = i; while (j < len && /[0-9._xXbBfFdDlL]/.test(code[j])) j++;
          out += `<span class="n">${escHtml(code.slice(i, j))}</span>`; i = j; continue;
        }
        // Identifier
        if (/[a-zA-Z_$]/.test(code[i])) {
          let j = i; while (j < len && /[\w$]/.test(code[j])) j++;
          const word = code.slice(i, j);
          if (JAVA_KEYWORDS.has(word)) {
            out += `<span class="k">${escHtml(word)}</span>`;
          } else if (/^[A-Z]/.test(word)) {
            out += `<span class="t">${escHtml(word)}</span>`;
          } else {
            out += escHtml(word);
          }
          i = j; continue;
        }
        out += escHtml(code[i]); i++;
      }
      return out;
    }

    // ── Display code ────────────────────────────────────────────────
    function displayCode(code) {
      currentRawCode = code;
      mainEl.classList.remove('idle');
      codeDisplay.innerHTML = tokeniseJava(code);
    }

    // ── Inject code from backend ────────────────────────────────────
    function injectCode(block, hint, unverified, isOcr) {
      currentRawCode = block;
      warnLine.style.color = '';
      warnLine.className = '';

      if (isOcr) {
        warnLine.textContent = 'ℹ OCR COMPLETE — Generating Solution…';
        warnLine.className = 'visible info';
      } else if (unverified) {
        warnLine.textContent = '⚠ UNVERIFIED — compilation not confirmed';
        warnLine.className = 'visible';
      } else {
        warnLine.textContent = '';
        warnLine.className = '';
      }

      mainEl.classList.remove('idle');
      displayCode(block);
    }

    // ── WebSocket handler ───────────────────────────────────────────
    function handleMessage(raw) {
      let data;
      try { data = JSON.parse(raw); }
      catch {
        displayCode(raw);
        return;
      }

      switch (data.type) {
        case 'init':
          if (data.state && data.state.current) {
            injectCode(data.state.current, null, false);
          }
          break;

        case 'solution': {
          const unverified = typeof data.hint === 'string' &&
            (data.hint.startsWith('WARNING:') || data.hint.startsWith('⚠'));
          injectCode(data.block || '', data.hint, unverified);
          break;
        }

        case 'ocr': {
          injectCode(data.block || '', null, false, true);
          break;
        }

        case 'status':
          statusBar.textContent = data.message || '';
          statusBar.className = '';
          break;

        case 'error':
          warnLine.textContent = '⚠ ' + (data.message || 'Unknown error');
          warnLine.className = 'visible';
          statusBar.textContent = 'Error occurred';
          statusBar.className = 'error';
          mainEl.classList.remove('idle');
          break;

        case 'ping':
          break;

        default: break;
      }
    }

    // ── WebSocket with auto-reconnect ───────────────────────────────
    function connect() {
      let wsUrl;
      if (window.location.protocol === 'https:') {
        const ip = prompt('Enter your local Sotti IPv4 address (e.g., 192.168.29.50):');
        if (!ip) return;
        wsUrl = `ws://${ip}:8000/ws`;
      } else {
        wsUrl = `ws://${window.location.host}/ws`;
      }

      const ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        statusBar.textContent = 'Connected';
        statusBar.className = 'connected';
      };

      ws.onmessage = (e) => handleMessage(e.data);

      ws.onclose = () => {
        statusBar.textContent = 'Reconnecting…';
        statusBar.className = '';
        setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();
    }

    // ── Fetch existing solution from REST API ─────────────────────
    async function fetchSolution() {
      try {
        const baseUrl = window.location.origin;
        const resp = await fetch(`${baseUrl}/api/solution`);
        const data = await resp.json();
        if (data.available && data.block) {
          injectCode(data.block, null, false);
          if (data.title) {
            statusBar.textContent = `✓ ${data.title}`;
            statusBar.className = 'connected';
          }
        }
      } catch (e) {
        console.log('Could not fetch solution:', e);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      connect();
      // Fetch existing solution right away
      fetchSolution();
      // Register Service Worker for PWA installability support
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('Service Worker Registered'))
          .catch(err => console.error('Service Worker Registration Failed:', err));
      }
    });
  </script>
</body>

</html>
