<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sotti — Java Assistant</title>
  
  <!-- Prism.js — GHColors theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prism-themes@1.9.0/themes/prism-ghcolors.css" />

  <style>
    /* ── Reset ──────────────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #ffffff;
      color: #000000;
      font-family: 'Fira Code', 'Consolas', monospace;
    }

    /* ── PIP-safe bounding box (Phase 3.5) ───────────────────────────
       60vw × 70vh in the top-left; bottom-right stays clear for PIP.  */
    #pip-safe-zone {
      width: 60vw;
      height: 70vh;
      overflow: hidden;
      position: absolute;
      top: 0;
      left: 0;
    }

    #pip-safe-zone pre {
      display: block;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0.5rem;
      background: #ffffff !important;
      border: none !important;
      box-shadow: none !important;
      text-shadow: none !important;
      text-align: left;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow: hidden;
      font-family: 'Fira Code', 'Consolas', monospace;
      line-height: 1.45;
    }

    #pip-safe-zone pre code {
      background: #ffffff !important;
      font-family: inherit !important;
      font-size: inherit !important;
      line-height: inherit !important;
      text-align: left;
      white-space: pre-wrap !important;
      word-wrap: break-word !important;
    }

    /* ── Prism token overrides (Phase 3.5) ───────────────────────── */
    .token.keyword   { color: #000080 !important; font-weight: bold !important; }
    .token.string    { color: #006400 !important; }
    .token.class-name,
    .token.type      { color: #4B0082 !important; font-weight: bold !important; }
    .token.comment   { color: #333333 !important; font-style: italic !important; }

    /* ── Inline unverified / error warning ───────────────────────── */
    #warn-line {
      display: none;
      color: #d32f2f;
      font-weight: bold;
      font-family: inherit;
      font-size: inherit;
      line-height: inherit;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    #warn-line.visible { display: block; }

    /* ── Blinking cursor (idle) ──────────────────────────────────── */
    #output.idle::after {
      content: '▍';
      display: inline-block;
      animation: blink 1s step-end infinite;
      color: #000080;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Minimal status ticker (Phase 6) ─────────────────────────── */
    #status-ticker {
      position: fixed;
      bottom: 10px;
      left: 10px;
      font-family: monospace;
      font-size: 1rem;
      color: #555;
    }
  </style>
</head>
<body>

  <!-- CENTER — Phase 3.5 pip-safe-zone -->
  <div id="pip-safe-zone">
    <pre id="output" class="idle"><span id="warn-line" role="alert"></span><code id="code-block" class="language-java">Waiting for Sotti…</code></pre>
  </div>

  <div id="status-ticker">Waiting for images...</div>

  <!-- Prism.js core + autoloader -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

  <script>
    // ── DOM refs ─────────────────────────────────────────────────────────
    const pipBox       = document.getElementById('pip-safe-zone');
    const outputPre    = document.getElementById('output');
    const codeBlock    = document.getElementById('code-block');
    const warnLine     = document.getElementById('warn-line');
    const statusTicker = document.getElementById('status-ticker');

    // ── Auto-fit font (Phase 3.5 → Phase 5 upgrade) ──────────────────────
    function autoFitText() {
      let size = 6.0;
      const MIN_REM = 0.5;
      outputPre.style.fontSize = size + 'rem';

      while (
        (outputPre.scrollHeight > pipBox.clientHeight ||
         outputPre.scrollWidth  > pipBox.clientWidth) &&
        size > MIN_REM
      ) {
        size = Math.round((size - 0.1) * 100) / 100;
        outputPre.style.fontSize = size + 'rem';
      }
    }

    // ── Workspace population helpers ──────────────────────────────────────
    function injectCode(block, hint, unverified) {
      if (unverified) {
        warnLine.textContent = '⚠ UNVERIFIED — compilation not confirmed\n';
        warnLine.classList.add('visible');
      } else {
        warnLine.textContent = '';
        warnLine.classList.remove('visible');
      }

      codeBlock.textContent = block;
      if (window.Prism) Prism.highlightAll();
      outputPre.classList.remove('idle');

      requestAnimationFrame(() => requestAnimationFrame(autoFitText));
    }

    // ── WebSocket message dispatcher ──────────────────────────────────────
    function handleMessage(raw) {
      let data;
      try { data = JSON.parse(raw); }
      catch {
        // Raw (non-JSON) fallback
        codeBlock.textContent = raw;
        if (window.Prism) Prism.highlightAll();
        requestAnimationFrame(() => requestAnimationFrame(autoFitText));
        return;
      }

      switch (data.type) {
        case 'init':
          if (data.state && data.state.current) {
            injectCode(data.state.current, null, false);
          }
          break;

        case 'solution': {
          const unverified = typeof data.hint === 'string'
                             && data.hint.startsWith('WARNING:');
          injectCode(data.block || '', data.hint, unverified);
          break;
        }

        case 'status':
          statusTicker.innerText = data.message || '';
          break;

        case 'error':
          warnLine.textContent = '⚠ Error: ' + (data.message || 'Unknown error') + '\n';
          warnLine.classList.add('visible');
          outputPre.classList.remove('idle');
          statusTicker.innerText = 'Error occurred.';
          requestAnimationFrame(() => requestAnimationFrame(autoFitText));
          break;

        default:
          break;
      }
    }

    // ── WebSocket with auto-reconnect ─────────────────────────────────────
    function connect() {
      let wsUrl;
      if (window.location.protocol === 'https:') {
        const ip = prompt('Enter your local Sotti IPv4 address (e.g., 192.168.29.50) for WebSocket connection:');
        if (!ip) return;
        wsUrl = `ws://${ip}:8000/ws`;
      } else {
        wsUrl = `ws://${window.location.host}/ws`;
      }

      const ws = new WebSocket(wsUrl);
      ws.onmessage = (e) => handleMessage(e.data);
      ws.onclose   = () => setTimeout(connect, 3000);
      ws.onerror   = () => ws.close();
    }

    document.addEventListener('DOMContentLoaded', connect);
  </script>
</body>
</html>
