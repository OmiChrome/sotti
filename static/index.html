<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Sotti</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1e1e2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sotti" />

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      /* 100dvh = dynamic viewport height — excludes browser chrome on mobile */
      width: 100dvw;
      height: 100dvh;
      overflow: hidden;
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: 'Fira Code', 'Consolas', monospace;
    }

    /* ── Scrollable code area ─────────────────────────────────────────── */
    #main {
      width: 100%;
      /* Fill full dynamic viewport. padding-bottom gives clearance so the
         last line of code is never hidden behind the status pill or PIP. */
      height: 100dvh;
      padding: 6px 14px 56px; /* 56px bottom > pip-guard(40px) + status pill */
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Code block ───────────────────────────────────────────────────── */
    .code-pre {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: inherit;
      font-size: 16px;
      line-height: 1.45;
      color: #cdd6f4;
      tab-size: 4;
    }

    /* ── Warn / OCR banner ────────────────────────────────────────────── */
    #warn-line {
      display: none;
      font-size: 12px;
      font-weight: bold;
      color: #f38ba8;
      white-space: pre-wrap;
      margin-bottom: 4px;
    }
    #warn-line.visible { display: block; }
    #warn-line.info    { color: #89b4fa; }

    /* ── Status pill — bottom-right, compact ─────────────────────────── */
    #status-pill {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 10px;
      color: #45475a;
      background: transparent;
      pointer-events: none;
      z-index: 90;
      /* keep it away from PIP area: PIP is 180×130, pill is tiny */
      max-width: 90px;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #status-pill.connected { color: #a6e3a1; }
    #status-pill.error     { color: #f38ba8; }
    #status-pill.busy      { color: #f9e2af; }

    /* ── Idle cursor blink ────────────────────────────────────────────── */
    #main.idle .code-pre::after {
      content: '▍';
      animation: blink 1s step-end infinite;
      color: #cba6f7;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Java syntax (Catppuccin Mocha) ──────────────────────────────── */
    .k { color: #cba6f7; font-weight: bold; }  /* keyword   */
    .s { color: #a6e3a1; }                      /* string    */
    .t { color: #f9e2af; font-weight: bold; }  /* type      */
    .c { color: #6c7086; font-style: italic; } /* comment   */
    .n { color: #fab387; }                      /* number    */
    .a { color: #89b4fa; }                      /* annotation*/
  </style>
</head>

<body>
  <div id="main" class="idle">
    <div id="warn-line" role="alert"></div>
    <pre id="code-display" class="code-pre">Waiting for Sotti…</pre>
  </div>

  <!-- Bottom-right status pill — tiny, doesn't block code -->
  <div id="status-pill">connecting</div>

  <script>
    const mainEl      = document.getElementById('main');
    const warnLine    = document.getElementById('warn-line');
    const codeDisplay = document.getElementById('code-display');
    const pill        = document.getElementById('status-pill');

    let currentRawCode = '';

    // ── Pill helpers ────────────────────────────────────────────────────
    function setPill(text, cls) {
      pill.textContent = text;
      pill.className = cls || '';
    }

    // ── Java tokeniser ───────────────────────────────────────────────────
    const KW = new Set([
      'abstract','assert','boolean','break','byte','case','catch','char','class',
      'const','continue','default','do','double','else','enum','extends','final',
      'finally','float','for','goto','if','implements','import','instanceof','int',
      'interface','long','native','new','package','private','protected','public',
      'return','short','static','strictfp','super','switch','synchronized','this',
      'throw','throws','transient','try','var','void','volatile','while','record',
      'sealed','permits','yield','null','true','false'
    ]);

    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function tokenise(code) {
      let out = '', i = 0; const n = code.length;
      while (i < n) {
        if (code[i]==='/'&&code[i+1]==='/') {
          const e=code.indexOf('\n',i), sl=e===-1?code.slice(i):code.slice(i,e);
          out+=`<span class="c">${esc(sl)}</span>`; i+=sl.length; continue;
        }
        if (code[i]==='/'&&code[i+1]==='*') {
          const e=code.indexOf('*/',i+2), sl=e===-1?code.slice(i):code.slice(i,e+2);
          out+=`<span class="c">${esc(sl)}</span>`; i+=sl.length; continue;
        }
        if (code[i]==='"') {
          let j=i+1; while(j<n){if(code[j]==='\\'){j+=2;continue;}if(code[j]==='"'){j++;break;}j++;}
          out+=`<span class="s">${esc(code.slice(i,j))}</span>`; i=j; continue;
        }
        if (code[i]==="'") {
          let j=i+1; while(j<n){if(code[j]==='\\'){j+=2;continue;}if(code[j]==="'"){j++;break;}j++;}
          out+=`<span class="s">${esc(code.slice(i,j))}</span>`; i=j; continue;
        }
        if (code[i]==='@') {
          let j=i+1; while(j<n&&/\w/.test(code[j]))j++;
          out+=`<span class="a">${esc(code.slice(i,j))}</span>`; i=j; continue;
        }
        if (/[0-9]/.test(code[i])&&(i===0||/\W/.test(code[i-1]))) {
          let j=i; while(j<n&&/[0-9._xXbBfFdDlL]/.test(code[j]))j++;
          out+=`<span class="n">${esc(code.slice(i,j))}</span>`; i=j; continue;
        }
        if (/[a-zA-Z_$]/.test(code[i])) {
          let j=i; while(j<n&&/[\w$]/.test(code[j]))j++;
          const w=code.slice(i,j);
          if (KW.has(w))      out+=`<span class="k">${esc(w)}</span>`;
          else if(/^[A-Z]/.test(w)) out+=`<span class="t">${esc(w)}</span>`;
          else                out+=esc(w);
          i=j; continue;
        }
        out+=esc(code[i]); i++;
      }
      return out;
    }

    // ── Render ───────────────────────────────────────────────────────────
    function displayCode(code) {
      currentRawCode = code;
      mainEl.classList.remove('idle');
      codeDisplay.innerHTML = tokenise(code);
    }

    function injectCode(block, hint, unverified, isOcr) {
      warnLine.className = '';
      if (isOcr) {
        warnLine.textContent = 'ℹ OCR done — generating…';
        warnLine.className = 'visible info';
      } else if (unverified) {
        warnLine.textContent = '⚠ Unverified';
        warnLine.className = 'visible';
      } else {
        warnLine.textContent = '';
      }
      displayCode(block);
    }

    // ── WebSocket ────────────────────────────────────────────────────────
    function handleMessage(raw) {
      let data;
      try { data = JSON.parse(raw); } catch { displayCode(raw); return; }

      switch (data.type) {
        case 'init':
          if (data.state?.current) injectCode(data.state.current, null, false);
          break;
        case 'solution': {
          const unv = typeof data.hint === 'string' &&
            (data.hint.startsWith('WARNING:') || data.hint.startsWith('⚠'));
          injectCode(data.block || '', data.hint, unv);
          setPill('✓ done', 'connected');
          break;
        }
        case 'ocr':
          injectCode(data.block || '', null, false, true);
          setPill('ocr…', 'busy');
          break;
        case 'status':
          setPill(data.message || '', 'busy');
          break;
        case 'error':
          warnLine.textContent = '⚠ ' + (data.message || 'error');
          warnLine.className = 'visible';
          setPill('err', 'error');
          mainEl.classList.remove('idle');
          break;
        case 'ping': break;
        default: break;
      }
    }

    function connect() {
      const wsUrl = window.location.protocol === 'https:'
        ? `wss://${window.location.host}/ws`
        : `ws://${window.location.host}/ws`;
      const ws = new WebSocket(wsUrl);
      ws.onopen    = () => setPill('●', 'connected');
      ws.onmessage = (e) => handleMessage(e.data);
      ws.onclose   = () => { setPill('…', ''); setTimeout(connect, 3000); };
      ws.onerror   = () => ws.close();
    }

    // ── Fetch existing solution on load ──────────────────────────────────
    async function fetchSolution() {
      try {
        const r = await fetch('/api/solution');
        const d = await r.json();
        if (d.available && d.block) {
          injectCode(d.block, null, false);
          if (d.title) setPill('✓', 'connected');
        }
      } catch {}
    }

    document.addEventListener('DOMContentLoaded', () => {
      fetchSolution();
      connect();
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      }
    });
  </script>
</body>
</html>
