<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Sotti — Java Assistant</title>

  <!-- PWA & Mobile Web App Meta Tags -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sotti" />

  <!-- Fira Code from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ──────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #ffffff;
      color: #000000;
      font-family: 'Fira Code', 'Roboto Mono', 'Consolas', monospace;
    }

    /* ── Wrapper that holds one or two panes ─────────────────────────────
       In single-pane mode: one full-width pane.
       In dual-pane mode:   two 50 vw panes side by side.                  */
    #pane-wrapper {
      display: flex;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      transition: none;
    }

    /* ── Each pane ───────────────────────────────────────────────────────  */
    .pane {
      height: 100%;
      overflow: hidden;
      padding: 8px 12px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* Single-pane default: full width */
    #pane-left  { width: 100vw; }
    #pane-right { width: 50vw;  display: none; border-left: 2px solid #e0e0e0; }

    /* Dual-pane mode activated by JS */
    #pane-wrapper.dual #pane-left  { width: 50vw; }
    #pane-wrapper.dual #pane-right { display: block; }

    /* PIP-safe overlay (bottom-right corner of the right pane).
       Covers ~34 % wide × 22 % tall — enough for a typical 320×180px PIP.  */
    #pane-right { position: relative; }
    #pane-right::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 34%; height: 22%;
      background: #ffffff;
      z-index: 10;
      pointer-events: none;
    }
    /* In single-pane mode the PIP corner is on the right pane which is hidden,
       so the single pane itself needs a PIP clearance on its own bottom-right. */
    #pane-left.pip-safe::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 22%; height: 22%;
      background: #ffffff;
      z-index: 10;
      pointer-events: none;
    }
    #pane-left { position: relative; }

    /* ── Code pre inside each pane ──────────────────────────────────────── */
    .code-pre {
      display: block;
      width: 100%;
      margin: 0; padding: 0;
      background: transparent;
      border: none;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: hidden;
      font-family: 'Fira Code', 'Roboto Mono', 'Consolas', monospace;
      font-size: 2rem;      /* default; overridden by autoFit */
      line-height: 1.5;
      color: #000000;
    }

    /* ── Java syntax token colours ───────────────────────────────────────  */
    .k { color: #000080; font-weight: bold; }   /* keyword      */
    .s { color: #006400; }                        /* string       */
    .t { color: #4B0082; font-weight: bold; }   /* type/class   */
    .c { color: #333333; font-style: italic; }  /* comment      */
    .n { color: #8B4513; }                       /* number       */
    .a { color: #1565C0; }                       /* annotation   */

    /* ── Blinking cursor (idle) ─────────────────────────────────────────── */
    #pane-left.idle::after {
      content: '▍';
      position: static;
      display: inline-block;
      animation: blink 1s step-end infinite;
      color: #000080;
      background: none;
      width: auto; height: auto;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Warn line ───────────────────────────────────────────────────────── */
    #warn-line {
      display: none;
      color: #d32f2f;
      font-weight: bold;
      font-family: inherit;
      white-space: pre-wrap;
    }
    #warn-line.visible { display: block; }

    /* ── Question title bar ────────────────────────────────────────────────── */
    #q-title-bar {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      font-size: 10px;
      font-family: inherit;
      color: rgba(0,0,0,0.35);
      background: rgba(255,255,255,0.85);
      z-index: 100;
      pointer-events: none;
      user-select: none;
      letter-spacing: 0.03em;
    }
    #q-title-bar.debug-mode {
      color: #1565C0;
      background: rgba(21,101,192,0.07);
    }
    #q-title-bar.debug-mode #debug-pill {
      display: inline-block;
    }
    #debug-pill {
      display: none;
      background: #1565C0;
      color: #fff;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 9px;
      letter-spacing: 0.05em;
    }
    /* Offset panes so title bar doesn't cover first line */
    /* #pane-wrapper { padding-top: 20px; height: calc(100vh - 20px); } */
  </style>
</head>
<body>

  <!-- Slim title bar -->
  <div id="q-title-bar">
    <span id="q-title-text">Sotti — Waiting…</span>
    <span id="debug-pill">📸 DEBUG MODE</span>
  </div>

  <div id="pane-wrapper">
    <!-- Left / primary pane -->
    <div id="pane-left" class="pane idle pip-safe">
      <pre id="code-left" class="code-pre"><span id="warn-line" role="alert"></span><span id="placeholder-text">Waiting for Sotti…</span></pre>
    </div>
    <!-- Right / overflow pane (hidden until dual-pane is activated) -->
    <div id="pane-right" class="pane">
      <pre id="code-right" class="code-pre"></pre>
    </div>
  </div>



  <script>
    // ── Constants ────────────────────────────────────────────────────────────
    // Minimum readable font size (px) for a 6-inch phone held at reading distance.
    // Below this we switch to dual-pane mode instead of shrinking further.
    const MIN_READABLE_PX = 8;
    const MAX_FONT_PX     = 36;
    const CHAR_W_RATIO    = 0.605;   // Fira Code: char width ≈ 0.605 × fontSize
    const LINE_H_RATIO    = 1.5;     // line-height

    // ── DOM refs ─────────────────────────────────────────────────────────────
    const wrapper         = document.getElementById('pane-wrapper');
    const paneLeft        = document.getElementById('pane-left');
    const paneRight       = document.getElementById('pane-right');
    const codeLeft        = document.getElementById('code-left');
    const codeRight       = document.getElementById('code-right');
    const warnLine        = document.getElementById('warn-line');
    const placeholderText = document.getElementById('placeholder-text');
    const qTitleBar       = document.getElementById('q-title-bar');
    const qTitleText      = document.getElementById('q-title-text');

    function setTitle(title) {
      if (title) qTitleText.textContent = title;
    }
    function setDebugMode(active) {
      if (active) qTitleBar.classList.add('debug-mode');
      else        qTitleBar.classList.remove('debug-mode');
    }

    let currentRawCode = '';

    // ── Java tokeniser ────────────────────────────────────────────────────────
    const JAVA_KEYWORDS = new Set([
      'abstract','assert','boolean','break','byte','case','catch','char','class',
      'const','continue','default','do','double','else','enum','extends','final',
      'finally','float','for','goto','if','implements','import','instanceof','int',
      'interface','long','native','new','package','private','protected','public',
      'return','short','static','strictfp','super','switch','synchronized','this',
      'throw','throws','transient','try','var','void','volatile','while','record',
      'sealed','permits','yield','null','true','false'
    ]);

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function tokeniseJava(code) {
      let out = '', i = 0;
      const len = code.length;
      while (i < len) {
        // Single-line comment
        if (code[i]==='/' && code[i+1]==='/') {
          const end = code.indexOf('\n', i);
          const sl  = end === -1 ? code.slice(i) : code.slice(i, end);
          out += `<span class="c">${escHtml(sl)}</span>`; i += sl.length; continue;
        }
        // Block comment
        if (code[i]==='/' && code[i+1]==='*') {
          const end = code.indexOf('*/', i+2);
          const sl  = end === -1 ? code.slice(i) : code.slice(i, end+2);
          out += `<span class="c">${escHtml(sl)}</span>`; i += sl.length; continue;
        }
        // String literal
        if (code[i]==='"') {
          let j = i+1;
          while (j<len) { if (code[j]==='\\'){j+=2;continue;} if(code[j]==='"'){j++;break;} j++; }
          out += `<span class="s">${escHtml(code.slice(i,j))}</span>`; i=j; continue;
        }
        // Char literal
        if (code[i]==="'") {
          let j = i+1;
          while (j<len) { if (code[j]==='\\'){j+=2;continue;} if(code[j]==="'"){j++;break;} j++; }
          out += `<span class="s">${escHtml(code.slice(i,j))}</span>`; i=j; continue;
        }
        // Annotation
        if (code[i]==='@') {
          let j=i+1; while(j<len && /\w/.test(code[j])) j++;
          out += `<span class="a">${escHtml(code.slice(i,j))}</span>`; i=j; continue;
        }
        // Number literal
        if (/[0-9]/.test(code[i]) && (i===0 || /\W/.test(code[i-1]))) {
          let j=i; while(j<len && /[0-9._xXbBfFdDlL]/.test(code[j])) j++;
          out += `<span class="n">${escHtml(code.slice(i,j))}</span>`; i=j; continue;
        }
        // Identifier
        if (/[a-zA-Z_$]/.test(code[i])) {
          let j=i; while(j<len && /[\w$]/.test(code[j])) j++;
          const word = code.slice(i,j);
          if (JAVA_KEYWORDS.has(word)) {
            out += `<span class="k">${escHtml(word)}</span>`;
          } else if (/^[A-Z]/.test(word)) {
            out += `<span class="t">${escHtml(word)}</span>`;
          } else {
            out += escHtml(word);
          }
          i=j; continue;
        }
        out += escHtml(code[i]); i++;
      }
      return out;
    }

    // ── Layout helpers ────────────────────────────────────────────────────────

    /** Estimate number of visual (wrapped) lines a raw text would occupy
     *  at a given font size inside a pane of paneWidthPx. */
    function countWrappedLines(rawLines, paneWidthPx, fontSize) {
      const charW = fontSize * CHAR_W_RATIO;
      const charsPerLine = Math.max(1, Math.floor((paneWidthPx - 24) / charW)); // 24 = 2×12px padding
      let rows = 0;
      for (const line of rawLines) {
        rows += Math.max(1, Math.ceil(line.length / charsPerLine));
      }
      return rows;
    }

    /** Max lines that fit in a pane of paneHeightPx at fontSize. */
    function linesPerPane(paneHeightPx, fontSize) {
      return Math.max(1, Math.floor(paneHeightPx / (fontSize * LINE_H_RATIO)));
    }

    // ── Single-pane: binary-search largest font that fits ─────────────────────
    function fitSinglePane(rawLines) {
      const pH = paneLeft.clientHeight;
      const pW = paneLeft.clientWidth;

      let lo = MIN_READABLE_PX, hi = MAX_FONT_PX, best = MIN_READABLE_PX;
      while (lo <= hi) {
        const mid = Math.floor((lo + hi) / 2);
        const totalRows = countWrappedLines(rawLines, pW, mid);
        const maxRows   = linesPerPane(pH, mid);
        if (totalRows <= maxRows) { best = mid; lo = mid + 1; }
        else                      { hi  = mid - 1; }
      }
      return best;
    }

    // ── Dual-pane: binary-search largest font where left+right fit ────────────
    function fitDualPane(rawLines) {
      // Left pane is 50vw, right pane is 50vw (minus PIP overlay area)
      const pH  = paneLeft.clientHeight;
      const pW  = Math.floor(window.innerWidth * 0.5);
      // Right pane: bottom 22 % × 34 % is blocked by PIP overlay; reduce effective height
      const pHR = Math.floor(pH * 0.78);

      let lo = MIN_READABLE_PX, hi = MAX_FONT_PX, bestFont = MIN_READABLE_PX, bestSplit = rawLines.length;
      while (lo <= hi) {
        const mid      = Math.floor((lo + hi) / 2);
        const maxRowsL = linesPerPane(pH,  mid);
        const maxRowsR = linesPerPane(pHR, mid);
        // Find split index
        let wrappedSoFar = 0, splitIdx = rawLines.length;
        const charW = mid * CHAR_W_RATIO;
        const cpl   = Math.max(1, Math.floor((pW - 24) / charW));
        for (let li = 0; li < rawLines.length; li++) {
          const rows = Math.max(1, Math.ceil(rawLines[li].length / cpl));
          wrappedSoFar += rows;
          if (wrappedSoFar > maxRowsL) { splitIdx = li; break; }
        }
        const rightLines = rawLines.slice(splitIdx);
        const rightRows  = countWrappedLines(rightLines, pW, mid);
        if (rightRows <= maxRowsR) { bestFont = mid; bestSplit = splitIdx; lo = mid + 1; }
        else                       { hi = mid - 1; }
      }
      return { fontSize: bestFont, splitIdx: bestSplit };
    }

    // ── Activate / deactivate dual pane mode ──────────────────────────────────
    function activateDual() {
      wrapper.classList.add('dual');
      paneLeft.classList.remove('pip-safe');  // PIP is on right pane in dual mode
    }
    function activateSingle() {
      wrapper.classList.remove('dual');
      paneLeft.classList.add('pip-safe');
    }

    // ── Main autoFit ──────────────────────────────────────────────────────────
    // Algorithm:
    //   1. Try to fit all code in a single pane by reducing font ≥ MIN_READABLE_PX.
    //   2. If even MIN_READABLE_PX overflows single pane → activate dual pane.
    //   3. In dual-pane mode, find largest font where left+right together fit.
    function autoFitText() {
      if (!currentRawCode) return;

      const rawLines = currentRawCode.split('\n');

      // ── Phase 1: try single pane ──────────────────────────────────────────
      const singleFontPx = fitSinglePane(rawLines);

      // Check if fits at MIN_READABLE_PX
      const pH = paneLeft.clientHeight;
      const pWFull = window.innerWidth;
      const totalRowsAtMin = countWrappedLines(rawLines, pWFull, MIN_READABLE_PX);
      const maxRowsAtMin   = linesPerPane(pH, MIN_READABLE_PX);

      if (totalRowsAtMin <= maxRowsAtMin) {
        // Code fits in one pane → use single
        activateSingle();

        // Force layout to settle so clientWidth is correct for single pane
        requestAnimationFrame(() => {
          codeLeft.style.fontSize  = singleFontPx + 'px';
          codeLeft.style.lineHeight = LINE_H_RATIO;
          codeLeft.innerHTML = warnLine.outerHTML + tokeniseJava(currentRawCode);
          codeRight.innerHTML = '';
        });
      } else {
        // ── Phase 2: go dual pane ───────────────────────────────────────────
        activateDual();

        requestAnimationFrame(() => {
          const { fontSize, splitIdx } = fitDualPane(rawLines);

          const leftLines  = rawLines.slice(0, splitIdx);
          const rightLines = rawLines.slice(splitIdx);

          codeLeft.style.fontSize   = fontSize + 'px';
          codeRight.style.fontSize  = fontSize + 'px';
          codeLeft.style.lineHeight  = LINE_H_RATIO;
          codeRight.style.lineHeight = LINE_H_RATIO;

          codeLeft.innerHTML  = warnLine.outerHTML + tokeniseJava(leftLines.join('\n'));
          codeRight.innerHTML = rightLines.length ? tokeniseJava(rightLines.join('\n')) : '';
        });
      }
    }

    // ── Inject code ───────────────────────────────────────────────────────────
    function injectCode(block, hint, unverified, isOcr) {
      currentRawCode = block;
      warnLine.style.color = '';

      if (isOcr) {
        warnLine.textContent = 'ℹ OCR COMPLETE — Generating Solution…\n';
        warnLine.style.color = '#1565C0';
        warnLine.classList.add('visible');
        setDebugMode(false);
      } else if (unverified) {
        warnLine.textContent = '⚠ UNVERIFIED — compilation not confirmed\n';
        warnLine.classList.add('visible');
        setDebugMode(true);  // solution ready, debug mode armed
      } else {
        warnLine.textContent = '';
        warnLine.classList.remove('visible');
        setDebugMode(true);  // verified solution — debug mode armed
      }

      paneLeft.classList.remove('idle');
      if (placeholderText) placeholderText.textContent = '';
      requestAnimationFrame(() => requestAnimationFrame(autoFitText));
    }

    window.addEventListener('resize', () => {
      requestAnimationFrame(() => requestAnimationFrame(autoFitText));
    });

    // ── WebSocket handler ────────────────────────────────────────────────────
    function handleMessage(raw) {
      let data;
      try { data = JSON.parse(raw); }
      catch {
        currentRawCode = raw;
        paneLeft.classList.remove('idle');
        requestAnimationFrame(() => requestAnimationFrame(autoFitText));
        return;
      }

      switch (data.type) {
        case 'init':
          if (data.state && data.state.current) injectCode(data.state.current, null, false);
          if (data.state && data.state.current_question_title) setTitle(data.state.current_question_title);
          break;
        case 'solution': {
          const unverified = typeof data.hint === 'string' &&
                             (data.hint.startsWith('WARNING:') || data.hint.startsWith('⚠'));
          injectCode(data.block || '', data.hint, unverified);
          break;
        }
        case 'ocr': {
          // data.title may be present now
          if (data.title) setTitle(data.title);
          injectCode(data.block || '', null, false, true);
          break;
        }
        case 'status':
          if (placeholderText) placeholderText.textContent = data.message || '';
          // Detecting debug analysis in flight
          if (data.message && data.message.toLowerCase().includes('debug')) {
            setDebugMode(true);
          }
          break;
        case 'error':
          warnLine.style.color = '#d32f2f';
          warnLine.textContent = '⚠ Error: ' + (data.message || 'Unknown error') + '\n';
          warnLine.classList.add('visible');
          paneLeft.classList.remove('idle');
          if (placeholderText) placeholderText.textContent = 'Error occurred.';
          setDebugMode(false);
          requestAnimationFrame(() => requestAnimationFrame(autoFitText));
          break;
        default: break;
      }
    }

    // ── WebSocket with auto-reconnect ─────────────────────────────────────────
    function connect() {
      let wsUrl;
      if (window.location.protocol === 'https:') {
        const ip = prompt('Enter your local Sotti IPv4 address (e.g., 192.168.29.50):');
        if (!ip) return;
        wsUrl = `ws://${ip}:8000/ws`;
      } else {
        wsUrl = `ws://${window.location.host}/ws`;
      }
      const ws = new WebSocket(wsUrl);
      ws.onmessage = (e) => handleMessage(e.data);
      ws.onclose   = () => { if (placeholderText) placeholderText.innerText = 'Reconnecting…'; setTimeout(connect, 3000); };
      ws.onerror   = () => ws.close();
      ws.onopen    = () => { if (placeholderText) placeholderText.innerText = 'Connected'; };
    }

    document.addEventListener('DOMContentLoaded', connect);
  </script>
</body>
</html>
